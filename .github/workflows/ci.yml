name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov ruff pyyaml

      - name: Lint
        run: ruff check .

      - name: Syntax and metadata checks
        run: |
          python -m compileall custom_components tools
          python -m json.tool custom_components/astra_energy/manifest.json >/dev/null
          python -m json.tool custom_components/astra_energy/translations/en.json >/dev/null
          python -m json.tool custom_components/astra_energy/translations/de.json >/dev/null
          python - <<'PY'
          import pathlib
          import yaml

          for path in pathlib.Path(".").glob("**/*.y*ml"):
              if ".git" not in path.parts:
                  yaml.safe_load(path.read_text())
          PY

      - name: Test with coverage
        run: |
          python -m pytest -q \
            --cov=custom_components.astra_energy.api \
            --cov=custom_components.astra_energy.statistics \
            --cov=custom_components.astra_energy.reporting \
            --cov=custom_components.astra_energy.web_session \
            --cov-report=term-missing \
            --cov-fail-under=100
