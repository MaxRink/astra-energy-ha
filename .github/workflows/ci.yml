name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov ruff

      - name: Lint
        run: ruff check .

      - name: Test with coverage
        run: |
          python -m pytest -q \
            --cov=custom_components.astra_energy.api \
            --cov=custom_components.astra_energy.statistics \
            --cov=custom_components.astra_energy.reporting \
            --cov-report=term-missing \
            --cov-fail-under=80
